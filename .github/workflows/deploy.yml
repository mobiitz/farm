name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CHAIN_ID: ${{ vars.VITE_CHAIN_ID }}
          VITE_CHAIN_NAME: ${{ vars.VITE_CHAIN_NAME }}
          VITE_PROJECT_NAME: ${{ vars.VITE_PROJECT_NAME }}
          VITE_PROJECT_TICKER: ${{ vars.VITE_PROJECT_TICKER }}
          VITE_TOKEN_SYMBOL: ${{ vars.VITE_TOKEN_SYMBOL }}
          VITE_TOKEN_ADDRESS: ${{ vars.VITE_TOKEN_ADDRESS }}
          VITE_QUOTE_TOKEN_SYMBOL: ${{ vars.VITE_QUOTE_TOKEN_SYMBOL }}
          VITE_QUOTE_TOKEN_ADDRESS: ${{ vars.VITE_QUOTE_TOKEN_ADDRESS }}
          VITE_QUOTE_TOKEN_DECIMALS: ${{ vars.VITE_QUOTE_TOKEN_DECIMALS }}
          VITE_LP_SYMBOL: ${{ vars.VITE_LP_SYMBOL }}
          VITE_REWARDS_CONTRACT_ADDRESS: ${{ vars.VITE_REWARDS_CONTRACT_ADDRESS }}
          VITE_LP_TOKEN_ADDRESS: ${{ vars.VITE_LP_TOKEN_ADDRESS }}
          VITE_V2_ROUTER_ADDRESS: ${{ vars.VITE_V2_ROUTER_ADDRESS }}
          VITE_V2_POOL_ADDRESS: ${{ vars.VITE_V2_POOL_ADDRESS }}
          VITE_LIQUIDITY_SLIPPAGE_BPS: ${{ vars.VITE_LIQUIDITY_SLIPPAGE_BPS }}
          VITE_LIQUIDITY_DEADLINE_MINUTES: ${{ vars.VITE_LIQUIDITY_DEADLINE_MINUTES }}
          VITE_TOKEN_DECIMALS: ${{ vars.VITE_TOKEN_DECIMALS }}
          VITE_LP_DECIMALS: ${{ vars.VITE_LP_DECIMALS }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
